          - generic [ref=e4479]: "# Interview Prep Knowledge Base ## Learn answer framework: requirements, APIs, components, bottlenecks, tradeoffs - Session: Learn answer framework: requirements, APIs, components, bottlenecks, tradeoffs - Category: system_design - Suggested status: done - Confidence: 4 - Result: solved_with_hint - Time spent: not provided minutes - Strengths: Can state user-centered requirements, design basic REST APIs, explain authenticated user ownership, choose Postgres as source of truth, describe component flow, and articulate bottlenecks/tradeoffs around relational indexes versus Elasticsearch. - Weak areas: Still needed repeated wording correction for concise interview phrasing, especially around API method choice, query parameters, and separating API gateway/auth layer responsibilities from API server responsibilities. - Next focus: Transfer the same framework to a new prompt, starting with URL shortener requirements: two functional requirements and one measurable non-functional requirement. - Tracker notes: User completed a full 5-section system design summary for a job application tracker. They improved from vague requirements and API wording to interview-ready phrasing covering ownership, JWT-based auth, POST/GET/PATCH APIs, Postgres data model, API server responsibilities, user-scoped queries, and search bottleneck tradeoffs. They understood when to start with relational indexes and when Elasticsearch may be useful as a secondary search index."