ination - Behavioral: Prepare cross-team collaboration story ### 2026-04-23 - Intervals: Merge Intervals; Insert Interval; Non-overlapping Intervals - System Design: Design a URL shortener - Behavioral: 10-minute design walkthrough ### 2026-04-24 - Trees: Maximum Depth of Binary Tree; Same Tree; Invert Binary Tree; Level Order Traversal - System Design: Replication vs sharding - Behavioral: Prepare ownership story ### 2026-04-25 - Trees: Diameter of Binary Tree or Max Depth redo; Validate BST; LCA of BST or Kth Smallest in BST - System Design: Design an authentication service - Behavioral: Explain auth design like an interview answer ### 2026-04-26 - Heap: Last Stone Weight or Kth Largest in Stream; Kth Largest Element in Array; Task Scheduler or Top K Frequent (heap) - System Design: Queues, retries, idempotency, DLQ idea - Behavioral: Explain heap choice clearly ### 2026-04-27 - Backtracking: Subsets; Combination Sum; Permutations - System Design: Design a notification service - Behavioral: Prepare ambiguity / unclear requirements story ### 2026-04-28 - Graphs: Number of Islands; Clone Graph; Rotting Oranges or Pacific Atlantic - System Design: Observability: logs, metrics, tracing, alerts - Behavioral: Practice graph traversal explanation ### 2026-04-29 - DP 1D: Climbing Stairs; House Robber; Coin Change - System Design: Design a file upload service - Behavioral: Prepare reliability/performance story ### 2026-04-30 - Mock: Review weakest recent problem; 1 easy + 1 timed medium; Design an API gateway with auth - Behavioral: Explain brute force -> optimal clearly ### 2026-05-01 - Review: Re-solve 3 weak-area problems; 1 new medium if energy allows - System Design: Review cache, queue, DB, LB, CDN, rate limiter - Behavioral: Refine top 5 stories ### 2026-05-02 - Mock: 1 old medium; 2 timed mediums; 20-minute mock: URL shortener or auth service - Behavioral: Practice Tell me about yourself + Why looking? ### 2026-05-03 - Mock: 1 familiar re-solve; 1 full 45-minute coding mock; 1 full 30-40 minute design mock - Behavioral: STAR story rehearsal ### 2026-05-04 - Review: 2 familiar mediums; 1 easy confidence problem - System Design: Review design template only - Behavioral: Review concise story bullets ### 2026-05-05 - Review: 1 easy; None or light review only - System Design: Mental rehearsal of design framework - Behavioral: Review OAuth, bug, tradeoff, ownership stories ## Knowledge Base ### Learn answer framework: requirements, APIs, components, bottlenecks, tradeoffs - Session: Learn answer framework: requirements, APIs, components, bottlenecks, tradeoffs - Category: system_design - Suggested status: done - Confidence: 4 - Result: solved_with_hint - Time spent: not provided - Strengths: Can state user-centered requirements, design basic REST APIs, explain authenticated user ownership, choose Postgres as source of truth, describe component flow, and articulate bottlenecks/tradeoffs around relational indexes versus Elasticsearch. - Weak areas: Still needed repeated wording correction for concise interview phrasing, especially around API method choice, query parameters, and separating API gateway/auth layer responsibilities from API server responsibilities. - Next focus: Transfer the same framework to a new prompt, starting with URL shortener requirements: two functional requirements and one measurable non-functional requirement. - Tracker notes: User completed a full 5-section system design summary for a job application tracker. They improved from vague requirements and API wording to interview-ready phrasing covering ownership, JWT-based auth, POST/GET/PATCH APIs, Postgres data model, API server responsibilities, user-scoped queries, and search bottleneck tradeoffs. They understood when to start with relational indexes and when Elasticsearch may be useful as a secondary search index."
